<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarthPulse AI</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .header { background: #2e7d32; color: white; padding: 1rem; text-align: center; }
        .main { flex: 1; display: flex; }
        .sidebar { width: 300px; padding: 1rem; border-right: 1px solid #ddd; overflow-y: auto; }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; }
        .report-card { border: 1px solid #eee; padding: 0.5rem; margin-bottom: 0.5rem; border-radius: 4px; }
        .severity-high { border-left: 5px solid red; }
        .severity-medium { border-left: 5px solid orange; }
        .severity-low { border-left: 5px solid yellow; }
    </style>
</head>
<body>
    <div id="root"></div>
</body>
</html>
